# GuestPost.cc Render Blueprint
#
# Target environment: internal staging on guestpost.pro.bd.
# External infrastructure is intentionally bring-your-own:
# - Postgres: Neon
# - Redis: Upstash
# - Mail: Resend SMTP
# - Object storage: Cloudflare R2
#
# Do not place real credentials in this file. Values marked sync: false are
# filled in the Render Dashboard during Blueprint creation/sync.

previews:
  generation: "off"

services:
  - type: web
    name: guestpost-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo build --filter=@guestpost/api...
    startCommand: cd apps/api && node dist/main.js
    healthCheckPath: /api/v1/health
    domains:
      - api.guestpost.pro.bd
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: QUEUE_SIGNING_SECRET
        sync: false
      - key: PAYOUT_ENCRYPTION_KEY
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: TRUSTED_ORIGINS
        value: https://guestpost.pro.bd,https://app.guestpost.pro.bd,https://publisher.guestpost.pro.bd,https://admin.guestpost.pro.bd,https://api.guestpost.pro.bd
      - key: CORS_ORIGIN
        value: https://guestpost.pro.bd,https://app.guestpost.pro.bd,https://publisher.guestpost.pro.bd,https://admin.guestpost.pro.bd
      - key: BETTER_AUTH_URL
        value: https://api.guestpost.pro.bd
      - key: API_BASE_URL
        value: https://api.guestpost.pro.bd/api/v1
      - key: NEXT_PUBLIC_API_URL
        value: https://api.guestpost.pro.bd
      - key: NEXT_PUBLIC_WEBSITE_URL
        value: https://guestpost.pro.bd
      - key: NEXT_PUBLIC_PORTAL_URL
        value: https://app.guestpost.pro.bd
      - key: NEXT_PUBLIC_PUBLISHER_URL
        value: https://publisher.guestpost.pro.bd
      - key: OAUTH_STATE_COOKIE_SAMESITE
        value: none
      - key: OAUTH_STATE_COOKIE_SECURE
        value: "true"
      - key: PRISMA_POOL_MAX
        value: "10"
      - key: PLATFORM_FEE_PERCENT
        value: "20"
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "2587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: GuestPost <noreply@guestpost.pro.bd>
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        value: guestpost-dev
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.05"

  - type: web
    name: guestpost-portal
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo build --filter=@guestpost/portal...
    startCommand: cd apps/portal && npx next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    domains:
      - app.guestpost.pro.bd
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        value: https://api.guestpost.pro.bd
      - key: NEXT_PUBLIC_WEBSITE_URL
        value: https://guestpost.pro.bd
      - key: NEXT_PUBLIC_PORTAL_URL
        value: https://app.guestpost.pro.bd
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging

