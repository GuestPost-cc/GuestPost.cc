      - key: NEXT_PUBLIC_API_URL
        value: https://api.guestpost.pro.bd
      - key: NEXT_PUBLIC_PORTAL_URL
        value: https://app.guestpost.pro.bd
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging

  - type: web
    name: guestpost-website
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    autoDeployTrigger: checksPass
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo build --filter=@guestpost/website...
    startCommand: cd apps/website && npx next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    domains:
      - guestpost.pro.bd
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        value: https://api.guestpost.pro.bd
      - key: NEXT_PUBLIC_WEBSITE_URL
        value: https://guestpost.pro.bd
      - key: NEXT_PUBLIC_PORTAL_URL
        value: https://app.guestpost.pro.bd
      - key: NEXT_PUBLIC_PUBLISHER_URL
        value: https://publisher.guestpost.pro.bd
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
