        value: https://api.guestpost.pro.bd
      - key: NEXT_PUBLIC_WEBSITE_URL
        value: https://guestpost.pro.bd
      - key: NEXT_PUBLIC_PORTAL_URL
        value: https://app.guestpost.pro.bd
      - key: NEXT_PUBLIC_PUBLISHER_URL
        value: https://publisher.guestpost.pro.bd
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging

