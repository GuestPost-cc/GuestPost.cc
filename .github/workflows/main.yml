name: Main

on:
  push:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://guestpost:guestpost@localhost:5432/guestpost_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: test-secret-for-ci-only
  BETTER_AUTH_URL: http://localhost:3000
  CORS_ORIGIN: http://localhost:3000

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: guestpost
          POSTGRES_PASSWORD: guestpost
          POSTGRES_DB: guestpost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build --filter=@guestpost/shared --filter=@guestpost/database --filter=@guestpost/auth --filter=@guestpost/ui --filter=@guestpost/api-client
        name: Build dependencies

      - run: pnpm -F @guestpost/database exec prisma migrate deploy
        name: Run DB migrations

      - run: pnpm run typecheck
        name: TypeScript check

      - run: pnpm -F @guestpost/api test
        name: Run tests

      - run: pnpm run build
        name: Build all packages
