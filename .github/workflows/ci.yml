name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_ENV: test
  DATABASE_URL: postgresql://guestpost:guestpost@localhost:5432/guestpost?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-only-jwt-secret-not-used-in-prod-0123456789
  BETTER_AUTH_SECRET: ci-only-auth-secret-not-used-in-prod-0123456789
  QUEUE_SIGNING_SECRET: ci-only-queue-secret-not-used-in-prod-012345
  BETTER_AUTH_URL: http://localhost:3000
  TRUSTED_ORIGINS: http://localhost:3000
  CORS_ORIGIN: http://localhost:3000
  GOOGLE_CLIENT_ID: ci-google-client-id
  GOOGLE_CLIENT_SECRET: ci-google-client-secret
  OAUTH_STATE_COOKIE_SAMESITE: lax
  OAUTH_STATE_COOKIE_SECURE: "false"

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: guestpost
          POSTGRES_PASSWORD: guestpost
          POSTGRES_DB: guestpost
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U guestpost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # package.json is the single source of truth for the pnpm version.
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=moderate

      - name: Install PostgreSQL client if missing
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends postgresql-client
          fi

      - name: Apply migrations to CI database
        run: pnpm --filter @guestpost/database exec prisma migrate deploy

      - name: Verify migration state
        run: pnpm --filter @guestpost/database exec prisma migrate status

      - name: Create integration-test template database
        env:
          PGPASSWORD: guestpost
        run: |
          psql -h localhost -U guestpost -d postgres -v ON_ERROR_STOP=1 \
            -c "DROP DATABASE IF EXISTS guestpost_test_template WITH (FORCE)"
          psql -h localhost -U guestpost -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE guestpost_test_template"

      - name: Apply migrations to integration-test template
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://guestpost:guestpost@localhost:5432/guestpost_test_template
        run: pnpm exec prisma migrate deploy

      - name: TypeScript check
        run: pnpm typecheck

      - name: Biome check
        run: pnpm lint:format

      - name: ESLint
        run: pnpm lint

      - name: Dependency graph validation
        run: pnpm repo:health

      - name: API unit tests
        run: pnpm --filter @guestpost/api test

      - name: API integration tests
        env:
          PGPASSWORD: guestpost
        run: pnpm --filter @guestpost/api test:integration

      - name: Package unit tests
        run: >-
          pnpm --filter @guestpost/shared
          --filter @guestpost/auth
          --filter @guestpost/integrations
          --filter @guestpost/api-client
          --filter @guestpost/worker
          test

      - name: UI component tests with coverage
        run: pnpm --filter @guestpost/ui test:coverage

      - name: Build all production targets
        run: pnpm build
