name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://guestpost:guestpost@localhost:5432/guestpost?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-only-jwt-secret-not-used-in-prod-0123456789
  QUEUE_SIGNING_SECRET: ci-only-queue-secret-not-used-in-prod-012345
  BETTER_AUTH_URL: http://localhost:3000
  CORS_ORIGIN: http://localhost:3000
  # Phase 7.7 C — Sentry source-map upload. When SENTRY_AUTH_TOKEN is
  # configured as a repo secret, `pnpm build` uploads source maps for
  # each Next.js app's bundle so production Sentry traces show source-
  # line + filename instead of minified offsets. When the secret is
  # unset (e.g. forks, PRs from external contributors), the upload step
  # is silently skipped and the build still succeeds.
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: guestpost
          POSTGRES_PASSWORD: guestpost
          POSTGRES_DB: guestpost
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U guestpost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      # Version comes from `packageManager: pnpm@11.5.1` in package.json.
      # Specifying `version:` here ALSO triggers pnpm/action-setup@v4 to error
      # with "Multiple versions of pnpm specified" — package.json is the
      # single source of truth.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build every workspace package the Next.js apps import at compile time.
      # Without ui + api-client built, tsc --noEmit on the apps fails with
      # "Cannot find module '@guestpost/ui'" because the dist/ outputs don't
      # exist yet for TypeScript path resolution.
      - run: pnpm run build --filter=@guestpost/shared --filter=@guestpost/database --filter=@guestpost/auth --filter=@guestpost/ui --filter=@guestpost/api-client
        name: Build dependencies

      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: packages/database

      - name: TypeScript check
        run: pnpm run typecheck

      # Phase 7.9 #30 — ESLint with react-hooks/rules-of-hooks across the
      # 3 frontend apps. Tight rule set (see eslint.config.mjs): only
      # @eslint/js recommended + typescript-eslint recommended +
      # rules-of-hooks. Catches the next #30-class regression at PR time.
      - name: Biome check (format + lint + imports)
        run: pnpm run lint:format

      - name: ESLint (hooks + TS)
        run: pnpm run lint

      - name: Dependency graph validation
        run: pnpm depcruise apps packages scripts e2e --include-only '^(apps|packages|scripts|e2e)/'

      - name: API unit tests
        run: pnpm test
        working-directory: apps/api

      - name: UI component tests (coverage)
        run: pnpm test:coverage
        working-directory: packages/ui

      - name: Build all targets
        run: pnpm build

      # Playwright journeys need the full app stack; they run in the
      # heavier nightly job / locally via `npx playwright test`.
