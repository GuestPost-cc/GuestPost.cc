name: PR

on:
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://guestpost:guestpost@localhost:5432/guestpost_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: test-secret-for-ci-only
  QUEUE_SIGNING_SECRET: ci-only-queue-secret-not-used-in-prod-012345
  BETTER_AUTH_URL: http://localhost:3000
  CORS_ORIGIN: http://localhost:3000

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: guestpost
          POSTGRES_PASSWORD: guestpost
          POSTGRES_DB: guestpost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      # Version comes from `packageManager: pnpm@11.5.1` in package.json.
      # Specifying `version:` here ALSO triggers pnpm/action-setup@v6 to error
      # with "Multiple versions of pnpm specified" — package.json is the
      # single source of truth.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build every workspace package the Next.js apps import at compile time.
      # Without ui + api-client built, tsc --noEmit on the apps fails with
      # "Cannot find module '@guestpost/ui'" because the dist/ outputs don't
      # exist yet for TypeScript path resolution.
      - run: pnpm run build --filter=@guestpost/shared --filter=@guestpost/database --filter=@guestpost/auth --filter=@guestpost/ui --filter=@guestpost/api-client
        name: Build dependencies

      - run: pnpm -F @guestpost/database exec prisma migrate deploy
        name: Run DB migrations

      # Phase 7.10.2.1 — Integration test template database (idempotent)
      - name: Install psql if missing
        run: command -v psql || sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Create integration test template database (idempotent)
        env:
          PGPASSWORD: guestpost
        run: |
          psql -h localhost -U guestpost -d postgres -c "DROP DATABASE IF EXISTS guestpost_test_template WITH (FORCE)"
          psql -h localhost -U guestpost -d postgres -c "CREATE DATABASE guestpost_test_template"

      - name: Apply migrations to template database
        run: DATABASE_URL=postgresql://guestpost:guestpost@localhost:5432/guestpost_test_template npx prisma migrate deploy
        working-directory: packages/database

      - name: Verify template database exists
        env:
          PGPASSWORD: guestpost
        run: |
          EXISTS=$(psql -h localhost -U guestpost -d postgres -t -A -c "SELECT COUNT(*) FROM pg_database WHERE datname='guestpost_test_template'")
          if [ "$EXISTS" != "1" ]; then echo "template DB missing" && exit 1; fi

      - run: pnpm run typecheck
        name: TypeScript check

      # Repository Hardening — Biome check (format + lint + imports).
      - run: pnpm run lint:format
        name: Biome check

      # Phase 7.9 #30 — ESLint with react-hooks/rules-of-hooks across the
      # 3 frontend apps. See ci.yml for rationale + scope.
      - run: pnpm run lint
        name: ESLint (hooks + TS)

      # Repository Hardening — Dependency graph validation.
      - run: pnpm depcruise apps packages scripts e2e --include-only '^(apps|packages|scripts|e2e)/'
        name: Dependency graph

      - run: pnpm -F @guestpost/api test
        name: Run tests

      - name: API integration tests (Jest, ephemeral DB per spec)
        env:
          PGPASSWORD: guestpost
        run: pnpm -F @guestpost/api test:integration
