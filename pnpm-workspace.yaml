packages:
  - "apps/*"
  - "packages/*"
# pnpm v11 build-script approvals (map form); onlyBuiltDependencies kept for
# older pnpm compatibility.
allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  esbuild: true
  msgpackr-extract: true
  sharp: true
  core-js: false
  # Phase 7.7 C — @sentry/cli's postinstall downloads a native binary used
  # to upload source maps after each Next.js build (one-time ~10MB download
  # per fresh install). At build time the cli is invoked but the upload step
  # is silently skipped when SENTRY_AUTH_TOKEN is unset, so devs running
  # `pnpm build` locally without the token are unaffected.
  '@sentry/cli': true
minimumReleaseAgeExclude:
  - '@sentry/core@10.58.0'
  - '@sentry/node-core@10.58.0'
  - '@sentry/node@10.58.0'
  - '@sentry/opentelemetry@10.58.0'
  - '@sentry/server-utils@10.58.0'
  - '@sentry/browser-utils@10.58.0'
  - '@sentry/browser@10.58.0'
  - '@sentry/feedback@10.58.0'
  - '@sentry/nextjs@10.58.0'
  - '@sentry/react@10.58.0'
  - '@sentry/replay-canvas@10.58.0'
  - '@sentry/replay@10.58.0'
  - '@sentry/vercel-edge@10.58.0'
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - esbuild
  - msgpackr-extract
  - sharp
