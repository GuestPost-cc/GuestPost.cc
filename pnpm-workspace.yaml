packages:
  - "apps/*"
  - "packages/*"
# pnpm v11 build-script approvals (map form); onlyBuiltDependencies kept for
# older pnpm compatibility.
allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  esbuild: true
  msgpackr-extract: true
  sharp: true
  core-js: false
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - esbuild
  - msgpackr-extract
  - sharp
